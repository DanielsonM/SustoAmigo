name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - master

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar ambiente
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Rodar testes
        run: make test

      - name: Compilar executável
        if: success()
        run: make build

      - name: Publicar artefato
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: executavel
          path: ./bin/SustoAmigo
